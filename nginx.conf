# ============================================================
# TranscriptCheck — nginx.conf
# Unit 3 Sec 3.4.8 — Runtime Configuration: Nginx behaviour is
#   entirely defined in this file — change one line and the
#   server behaves differently, with no code changes required
# Unit 3 Sec 3.3.6 — Construction with Reuse: Nginx is a
#   battle-tested open source component reused as infrastructure
# Unit 1 Sec 1.3  — Anticipating Change: with Nginx in front,
#   the backend can be replaced without touching the proxy config
# ============================================================

# Number of worker processes — auto detects CPU core count
worker_processes auto;

events {
    # Maximum simultaneous connections per worker
    worker_connections 1024;
}

http {
    # Include standard MIME type definitions
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format for request audit trail
    # Unit 1 Sec 1.6 — SCM: every request is logged with timestamp
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # Efficient file sending — bypasses user space for static files
    sendfile on;

    # Keep connections alive for 65 seconds to reduce overhead
    keepalive_timeout 65;

    # Enable gzip compression for faster response delivery
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml text/javascript;

    # ── Upstream block ─────────────────────────────────────────
    # Defines the Next.js application server as the upstream target.
    # Unit 3 Sec 3.3.6 — Construction with Reuse: Nginx delegates
    # all application logic to Next.js — separation of concerns.
    upstream nextjs_app {
        server nextjs:3000;
    }

    # ── Server block ───────────────────────────────────────────
    # Nginx listens on port 80 (standard HTTP port).
    # Users access the site on port 80 — they never see port 3000.
    server {
        listen 80;
        server_name _;

        # Maximum upload size — set to 20MB to support PDF transcripts
        client_max_body_size 20M;

        # ── Reverse proxy ──────────────────────────────────────
        # All incoming requests are forwarded to the Next.js app.
        # This is the core reverse proxy behaviour.
        location / {
            proxy_pass         http://nextjs_app;
            proxy_http_version 1.1;

            # Required headers for WebSocket support (Next.js hot reload)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';

            # Pass the real client IP to Next.js
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Do not use cached responses — always go to Next.js
            proxy_cache_bypass $http_upgrade;
        }

        # ── Static file caching ────────────────────────────────
        # Next.js static assets are cached for 1 year in the browser.
        # These files have a content hash in their filename so
        # caching them indefinitely is safe.
        location /_next/static/ {
            proxy_pass http://nextjs_app;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Health check endpoint ──────────────────────────────
        # Returns 200 OK immediately — used by Railway and Docker
        # to verify the container is running and healthy.
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}